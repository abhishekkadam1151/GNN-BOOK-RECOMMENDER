<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GNN-powered Book Recommendation System - Get personalized book suggestions">
    <title>📚 Book Recommender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div id="results"></div>
</div>

<script src="script.js"></script>
